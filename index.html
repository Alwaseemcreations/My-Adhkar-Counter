<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>Digital Tasbih Counter</title>
<meta name="theme-color" content="#0d2016">
<style>
/* ---------- Reset & base ---------- */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  -webkit-tap-highlight-color: transparent;
}

html, body {
  height: 100%;
}

body {
  min-height: 100dvh;
  background:
    radial-gradient(120% 90% at 50% 8%, #16311f 0%, #0c1c12 55%, #070f0a 100%);
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
}

/* ---------- Stage & device ---------- */
.stage {
  width: 100%;
  height: 100dvh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: clamp(16px, 5vw, 40px);
}

.device {
  position: relative;
  width: 100%;
  max-width: 420px;
  aspect-ratio: 1024 / 1536;
  margin: 0 auto;
  filter: drop-shadow(0 25px 45px rgba(0, 0, 0, 0.55));
  user-select: none;
}

.device__image {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  object-fit: contain;
  pointer-events: none;
  -webkit-user-drag: none;
  user-select: none;
  display: block;
}

/* ---------- LCD display ---------- */
.lcd {
  position: absolute;
  left: 24.3%;
  top: 17.8%;
  width: 51.4%;
  height: 16.5%;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  pointer-events: none;
  padding: 0 6%;
}

.lcd__value {
  display: inline-block;
  white-space: nowrap;
  font-family: 'Courier New', Courier, monospace;
  font-weight: 700;
  letter-spacing: 0.12em;
  font-variant-numeric: tabular-nums;
  color: #f3d98a;
  text-shadow:
    0 0 4px rgba(243, 217, 138, 0.85),
    0 0 14px rgba(243, 217, 138, 0.45),
    0 0 26px rgba(233, 179, 61, 0.25);
  line-height: 1;
  transition: opacity 0.25s ease;
}

.lcd__value.is-fading {
  opacity: 0;
}

/* ---------- Invisible hotspots ---------- */
.hotspot {
  position: absolute;
  background: transparent;
  border: none;
  outline: none;
  padding: 0;
  margin: 0;
  cursor: pointer;
  -webkit-appearance: none;
  appearance: none;
  touch-action: manipulation;
  transition: transform 0.08s ease, filter 0.08s ease;
}

.hotspot:focus-visible {
  box-shadow: 0 0 0 3px rgba(243, 217, 138, 0.85);
  border-radius: 50%;
}

.hotspot--count {
  left: 29%;
  top: 34.8%;
  width: 42%;
  height: 27%;
  border-radius: 50%;
}

.hotspot--reset {
  left: 24%;
  top: 62.2%;
  width: 52%;
  height: 7.6%;
  border-radius: 999px;
}

.hotspot--delete {
  left: 58%;
  top: 70.3%;
  width: 21%;
  height: 7.2%;
  border-radius: 999px;
}

/* Press feedback: darken + slightly compress the tapped region */
.hotspot.is-pressed {
  filter: brightness(0.82) saturate(1.05);
}

.hotspot--count.is-pressed {
  transform: scale(0.96);
}

.hotspot--reset.is-pressed,
.hotspot--delete.is-pressed {
  transform: scale(0.95);
}

/* ---------- Reduced motion ---------- */
@media (prefers-reduced-motion: reduce) {
  .hotspot,
  .lcd__value {
    transition: none;
  }
}

</style>
</head>

    <!-- LCD digit readout, positioned over the display cutout in the image -->

      <span id="counterValue" class="lcd__value" role="status" aria-live="polite" aria-atomic="true"></span>
    </div>

    <!-- Invisible touch/click regions aligned to the image's physical buttons -->
    <button type="button" id="btnCount" class="hotspot hotspot--count" aria-label="Count, tap to increase"></button>

<script>
(() => {
  'use strict';

  const STORAGE_KEY = 'tasbih.count';

  const lcdBox = document.querySelector('.lcd');
  const lcdValue = document.getElementById('counterValue');
  const btnCount = document.getElementById('btnCount');
  const btnReset = document.getElementById('btnReset');
  const btnDelete = document.getElementById('btnDelete');

  /**
   * count is either an integer >= 1, or null meaning "blank display".
   */
  let count = loadCount();

  function loadCount() {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw === null || raw === '') return null;
    const n = parseInt(raw, 10);
    return Number.isFinite(n) && n > 0 ? n : null;
  }

  function saveCount() {
    if (count === null) {
      localStorage.removeItem(STORAGE_KEY);
    } else {
      localStorage.setItem(STORAGE_KEY, String(count));
    }
  }

  /* ---------- Rendering ---------- */

  function render() {
    lcdValue.textContent = count === null ? '' : String(count);
    fitFont();
  }

  // Shrink the digit text to always fit inside the LCD cutout, never overflowing.
  function fitFont() {
    const boxRect = lcdBox.getBoundingClientRect();
    if (boxRect.width === 0 || boxRect.height === 0) return;

    // Start from a size proportional to the LCD panel height, then shrink if needed.
    let fontSize = Math.round(boxRect.height * 0.62);
    lcdValue.style.fontSize = fontSize + 'px';

    const maxWidth = lcdBox.clientWidth;
    let guard = 60; // safety cap on iterations
    while (lcdValue.scrollWidth > maxWidth && fontSize > 8 && guard > 0) {
      fontSize -= 1;
      lcdValue.style.fontSize = fontSize + 'px';
      guard -= 1;
    }
  }

  /* ---------- Actions ---------- */

  function doCount() {
    count = count === null ? 1 : count + 1;
    saveCount();
    render();
    vibrate(12);
  }

  function doDelete() {
    if (count === null) return; // nothing to delete from blank
    count = count - 1;
    if (count <= 0) count = null;
    saveCount();
    render();
  }

  function doReset() {
    if (count === null) return; // already blank, nothing to animate
    lcdValue.classList.add('is-fading');
    window.setTimeout(() => {
      count = null;
      saveCount();
      render();
      lcdValue.classList.remove('is-fading');
    }, 180);
  }

  function vibrate(ms) {
    if ('vibrate' in navigator) {
      try { navigator.vibrate(ms); } catch (e) { /* ignore unsupported */ }
    }
  }

  /* ---------- Press feedback (mouse, touch, pen, keyboard) ---------- */

  function wirePress(el) {
    const press = () => el.classList.add('is-pressed');
    const release = () => el.classList.remove('is-pressed');

    el.addEventListener('pointerdown', press);
    el.addEventListener('pointerup', release);
    el.addEventListener('pointercancel', release);
    el.addEventListener('pointerleave', release);

    el.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' || e.key === ' ') press();
    });
    el.addEventListener('keyup', (e) => {
      if (e.key === 'Enter' || e.key === ' ') release();
    });
  }

  [btnCount, btnReset, btnDelete].forEach(wirePress);

  btnCount.addEventListener('click', doCount);
  btnDelete.addEventListener('click', doDelete);
  btnReset.addEventListener('click', doReset);

  /* ---------- Keep digits sized correctly as the device scales ---------- */

  if ('ResizeObserver' in window) {
    new ResizeObserver(() => fitFont()).observe(document.querySelector('.device'));
  } else {
    window.addEventListener('resize', fitFont);
  }

  /* ---------- Initial paint ---------- */
  render();
})();

</script>
</body>
</html>
